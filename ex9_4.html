<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/ ">

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="css/style.css">
    
    <title>Astral JavaScript </title>
</head>
<body>
    <img src="img/ " alt="Imagem Astral" class="normal">
    <div class="container-fluid">
        <div class="row" id="divTitulo">
            <div class="col-sm-7">
            <h1> Astral | Zodíaco </h1>
            <h2>Receba Previsões para o seu Signo</h2>
        </div>
        
     <div class="col-sm-3">
        <h5>Qual é o seu signo?</h5>
        <form>
        <fieldset>
        <input type="radio" value="Áries" name="signo" id="rbAries"> Áries <br>
        <input type="radio" value="Touro" name="signo" id="rbTouro"> Touro <br>
        <input type="radio" value="Gêmeos" name="signo" id="rbGemeos"> Gêmeos <br>
        <input type="radio" value="Câncer" name="signo" id="rbCancer"> Câncer <br>
        <input type="radio" value="Leão" name="signo" id="rbLeao"> Leão <br>
        <input type="radio" value="Virgem" name="signo" id="rbVirgem"> Virgem <br>
        <input type="radio" value="Libra" name="signo" id="rbLibra"> Libra <br>
        <input type="radio" value="Escorpião" name="signo" id="rbEscorpiao"> Escorpião <br>
        <input type="radio" value="Sagitário" name="signo" id="rbSagitario"> Sagitário <br>
        <input type="radio" value="Capricórnio" name="signo" id="rbCapricornio"> Capricórnio <br>
        <input type="radio" value="Aquário" name="signo" id="rbAquario"> Aquário <br>
        <input type="radio" value="Peixes" name="signo" id="rbPeixes"> Peixes <br>
        <input type="radio" value="Nenhum" name="signo" id="rbNenhum" checked> Nenhum <br>
        </fieldset>
        <button type="button">Salvar no Astral</button>
        </form>
        
     </div>
        <div class="col-sm-2">
        <img id="imgSigno" class="d-none">
     </div>
     
     <div id="infoSigno">
        <h2 id="outNome"></h2>
        <p id="outElemento"></p>
        <p id="outCombina"></p>
        <p id="outCaracteristicas"></p>
        <p id="outPeriodo"></p>
    </div>

    <p id="outMensagem"></p>

    <div class="resultado">
        <p class="mensagem-signo">Seu signo salvo aparecerá aqui.</p>
    </div>
</div>
    <script 
        src="js/ex9_4.js"></script>
</body>
</html>
